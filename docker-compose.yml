# LedgerMem Enterprise — single-node self-hosted stack.
#
# Bring it up with:
#   cp .env.example .env
#   # fill in LEDGERMEM_LICENSE_KEY, OPENAI_API_KEY, JWT secrets, postgres password
#   docker compose up -d
#
# Hostname: api.ledgermem.your-org.com (terminate TLS at your reverse proxy)
# Health:   curl https://api.ledgermem.your-org.com/health/ready
#
# This compose file targets a small single-node deployment (one customer
# workspace, < 100k memories). For multi-node + HA see helm/ instead.

x-defaults: &defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

services:
  api:
    <<: *defaults
    image: ghcr.io/ledgermem/memory-api:${LEDGERMEM_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      MEMORY_API_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ledgermem?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4100
      MEMORY_API_TRUST_PROXY: 1
      LEDGERMEM_LICENSE_KEY: ${LEDGERMEM_LICENSE_KEY}
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4100/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *defaults
    image: ghcr.io/ledgermem/memory-api:${LEDGERMEM_VERSION:-latest}
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      MEMORY_API_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ledgermem?schema=public
      REDIS_URL: redis://redis:6379
      MEMORY_API_WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      LEDGERMEM_LICENSE_KEY: ${LEDGERMEM_LICENSE_KEY}

  postgres:
    <<: *defaults
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ledgermem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgermem"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    <<: *defaults
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    <<: *defaults
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    <<: *defaults
    image: grafana/grafana:11.3.1
    profiles: ["observability"]
    depends_on:
      - prometheus
    environment:
      # Fail fast if the operator forgot to set this — never silently default
      # the admin password to "admin" in production.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
